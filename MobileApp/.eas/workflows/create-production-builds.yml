name: Create Production Builds

# This section tells GitHub WHEN to run the pipeline
on:
  push:
    branches:
      - main
      - dev  # Added to ensure your current work triggers the build
  pull_request:
    branches:
      - main
      - dev

# This section tells EAS WHAT to do
jobs:
  build_android:
    name: Build Android Production
    type: build
    params:
      platform: android
      profile: production
